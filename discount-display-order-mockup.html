<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discount Display Order — Mockup</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .page { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Top nav ── */
    .top-nav {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tabs { display: flex; }
    .tab {
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #777;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.12s;
      user-select: none;
    }
    .tab.active { color: #558B2F; border-bottom-color: #8BC34A; font-weight: 600; }
    .nav-right { font-size: 13px; color: #999; padding-right: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      background: #fff;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #e8e8e8;
    }
    .btn-filter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1.5px solid #d8d8d8;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      color: #444;
      cursor: pointer;
      font-weight: 500;
      transition: border-color 0.12s;
    }
    .btn-filter:hover { border-color: #aaa; }
    .filter-badge {
      background: #8BC34A;
      color: #fff;
      border-radius: 50%;
      width: 17px; height: 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10.5px;
      font-weight: 700;
    }
    .view-toggle {
      display: flex;
      border: 1.5px solid #d8d8d8;
      border-radius: 6px;
      overflow: hidden;
    }
    .view-btn {
      padding: 5px 9px;
      background: #fff;
      border: none;
      cursor: pointer;
      color: #888;
      display: flex;
      align-items: center;
      font-size: 14px;
    }
    .view-btn.active { background: #f0f0f0; color: #333; }
    .view-btn + .view-btn { border-left: 1.5px solid #d8d8d8; }

    .toolbar-spacer { flex: 1; }

    .btn-set-order {
      padding: 7px 15px;
      border-radius: 6px;
      border: 1.5px solid #8BC34A;
      background: #fff;
      color: #558B2F;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.12s;
    }
    .btn-set-order:hover { background: #F1F8E9; }

    .btn-save {
      padding: 7px 20px;
      border-radius: 6px;
      border: none;
      background: #8BC34A;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-save:hover { background: #7CB342; }

    .btn-cancel {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1.5px solid #d8d8d8;
      background: #fff;
      color: #555;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-cancel:hover { border-color: #aaa; color: #222; }

    .btn-add {
      padding: 7px 18px;
      border-radius: 6px;
      border: none;
      background: #8BC34A;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-add:hover { background: #7CB342; }

    .mockup-badge {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #E65100;
      background: #FFF3E0;
      border: 1px solid #FFCC80;
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
    }

    /* ── Edit mode banner ── */
    .edit-banner {
      background: #F1F8E9;
      border-bottom: 1px solid #C5E1A5;
      padding: 9px 24px;
      font-size: 13px;
      color: #33691E;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Table area ── */
    .table-wrap { padding: 20px 24px; flex: 1; }

    .count-label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 14px;
    }

    .table-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e8e8e8;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { border-bottom: 1px solid #e8e8e8; background: #fafafa; }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11.5px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    td {
      padding: 11px 14px;
      font-size: 13px;
      color: #333;
      border-bottom: 1px solid #f2f2f2;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.08s; }
    tbody tr:hover { background: #fafffe; }

    /* drag handle */
    .drag-handle {
      color: #c0c0c0;
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: center;
      transition: color 0.1s;
    }
    .drag-handle:hover { color: #8BC34A; }
    .drag-handle:active { cursor: grabbing; }

    /* status */
    .status-active {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      font-weight: 500;
      color: #2E7D32;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4CAF50;
      flex-shrink: 0;
    }

    /* store chip */
    .store-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .store-chip.multi {
      background: #f5f5f5;
      font-weight: 600;
      color: #333;
    }

    td.name-cell {
      font-weight: 500;
      max-width: 280px;
    }

    /* drag states */
    tr.is-dragging { opacity: 0.35; }
    tr.is-drag-over-top td { border-top: 2px solid #8BC34A !important; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toastIn 0.2s ease;
      white-space: nowrap;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .toast-check {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #8BC34A;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

/*
  All active discounts have a display_order.
  New discounts get max(display_order) + 1 and appear at the bottom.
  Deactivated discounts are excluded.
  display_order is internal — never shown in the UI.
*/
const RAW_DISCOUNTS = [
  { id:  1, name: 'weekend deal',                 method: 'Dollar',          amount: '$1.00',   stores: "Hope's Flower...", storeCount: 1,  start: '03/04/26', end: 'N/A',      display_order:  1 },
  { id:  2, name: 'Senior 10%',                   method: 'Percent',         amount: '10.00%',  stores: "Hope's Flower...", storeCount: 1,  start: '—',        end: '—',        display_order:  2 },
  { id:  3, name: 'employee 40%',                 method: 'Percent',         amount: '40.00%',  stores: "Hope's Flower...", storeCount: 1,  start: '—',        end: '—',        display_order:  3 },
  { id:  4, name: 'BOGO $1 UI AUTOMATION FLOWER', method: 'Buy One Get One', amount: '$1.00',   stores: "Hope's Flower...", storeCount: 1,  start: '—',        end: '—',        display_order:  4 },
  { id:  5, name: 'Bundle Vape 2 for $40 - stack',method: 'Bundle',          amount: '$40.00',  stores: "Hope's Flower...", storeCount: 1,  start: '—',        end: '—',        display_order:  5 },
  { id:  6, name: '331 auto deactivate test 4',   method: 'Dollar',          amount: '$1.00',   stores: "Hope's Flower...", storeCount: 1,  start: '03/31/26', end: 'N/A',      display_order:  6 },
  { id:  7, name: '331 auto deactivate test 6',   method: 'Dollar',          amount: '$1.00',   stores: "Hope's Flower...", storeCount: 1,  start: '03/31/26', end: '04/30/26', display_order:  7 },
  { id:  8, name: 'API BEV PRICE AT $100',        method: 'Price At',        amount: '$100.00', stores: "Hope's Flower...", storeCount: 1,  start: '—',        end: '—',        display_order:  8 },
  { id:  9, name: 'auto',                         method: 'Dollar',          amount: '$2.00',   stores: 'testdevmax',       storeCount: 1,  start: '—',        end: '—',        display_order:  9 },
  { id: 10, name: 'Cornerstone new update',       method: 'Dollar',          amount: '$1.00',   stores: "Hope's Flower...", storeCount: 1,  start: '03/23/26', end: 'N/A',      display_order: 10 },
  { id: 11, name: 'Occurrences Test',             method: 'Dollar',          amount: '$1.00',   stores: "Hope's Flower...", storeCount: 1,  start: '03/31/26', end: 'N/A',      display_order: 11 },
  { id: 12, name: 'Test Monday 26',               method: 'Dollar',          amount: '$3.00',   stores: 'Multiple',         storeCount: 2,  start: '01/26/26', end: 'N/A',      display_order: 12 },
  { id: 13, name: 'test strike',                  method: 'Dollar',          amount: '$2.00',   stores: 'Multiple',         storeCount: 36, start: '—',        end: '—',        display_order: 13 },
  { id: 14, name: 'Weekend Promo',                method: 'Dollar',          amount: '$1.00',   stores: "Hope's Flower...", storeCount: 1,  start: '03/13/26', end: 'N/A',      display_order: 14 },
];

function byDisplayOrder(list) {
  return [...list].sort((a, b) => a.display_order - b.display_order);
}

function DragHandleIcon() {
  return (
    <svg width="14" height="20" viewBox="0 0 14 20" fill="none">
      <circle cx="4"  cy="4"  r="1.5" fill="currentColor"/>
      <circle cx="10" cy="4"  r="1.5" fill="currentColor"/>
      <circle cx="4"  cy="10" r="1.5" fill="currentColor"/>
      <circle cx="10" cy="10" r="1.5" fill="currentColor"/>
      <circle cx="4"  cy="16" r="1.5" fill="currentColor"/>
      <circle cx="10" cy="16" r="1.5" fill="currentColor"/>
    </svg>
  );
}

function StoreChip({ stores, count }) {
  if (count > 1) return <span className="store-chip multi">{count} {stores}</span>;
  return <span className="store-chip">{stores}</span>;
}

function App() {
  const [discounts,   setDiscounts]   = useState(() => byDisplayOrder(RAW_DISCOUNTS));
  const [editMode,    setEditMode]    = useState(false);
  const [editList,    setEditList]    = useState([]);
  const [dragIdx,     setDragIdx]     = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const [toast,       setToast]       = useState(null);
  const toastRef = useRef(null);

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 3000);
  }

  function enterEditMode() {
    setEditList([...discounts]);
    setEditMode(true);
  }

  function cancelEdit() {
    setEditMode(false);
    setEditList([]);
    setDragIdx(null);
    setDragOverIdx(null);
  }

  function saveOrder() {
    // Normalize position to 1..n and persist as display_order
    const updated = editList.map((d, i) => ({ ...d, display_order: i + 1 }));
    setDiscounts(updated);
    setEditMode(false);
    setEditList([]);
    setDragIdx(null);
    setDragOverIdx(null);
    showToast('Display order saved');
  }

  function onDragStart(e, idx) {
    setDragIdx(idx);
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragOver(e, idx) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    setDragOverIdx(idx);
  }
  function onDrop(e, idx) {
    e.preventDefault();
    if (dragIdx === null || dragIdx === idx) { setDragOverIdx(null); return; }
    const list = [...editList];
    const [moved] = list.splice(dragIdx, 1);
    list.splice(idx, 0, moved);
    setEditList(list);
    setDragIdx(null);
    setDragOverIdx(null);
  }
  function onDragEnd() {
    setDragIdx(null);
    setDragOverIdx(null);
  }

  const rows = editMode ? editList : discounts;

  return (
    <div className="page">

      {/* Top nav */}
      <div className="top-nav">
        <div className="tabs">
          <div className="tab active">Automated Discounts</div>
          <div className="tab">Manual Discounts</div>
        </div>
        <div className="nav-right">SellTreez Dev Testing</div>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <button className="btn-filter">Store ▾</button>
        <button className="btn-filter">
          <span className="filter-badge">1</span>&nbsp;Status ▾
        </button>
        <div className="view-toggle">
          <button className="view-btn active">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6">
              <line x1="2" y1="4" x2="14" y2="4"/>
              <line x1="2" y1="8" x2="14" y2="8"/>
              <line x1="2" y1="12" x2="14" y2="12"/>
            </svg>
          </button>
          <button className="view-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6">
              <rect x="1" y="2" width="14" height="13" rx="1.5"/>
              <line x1="1" y1="6" x2="15" y2="6"/>
              <line x1="5" y1="0.5" x2="5" y2="4"/>
              <line x1="11" y1="0.5" x2="11" y2="4"/>
            </svg>
          </button>
        </div>

        <div className="toolbar-spacer" />

        {editMode ? (
          <>
            <button className="btn-cancel" onClick={cancelEdit}>Cancel</button>
            <button className="btn-save"   onClick={saveOrder}>Save Order</button>
          </>
        ) : (
          <>
            <button className="btn-set-order" onClick={enterEditMode}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.8">
                <line x1="2" y1="3"  x2="12" y2="3"/>
                <line x1="2" y1="7"  x2="9"  y2="7"/>
                <line x1="2" y1="11" x2="6"  y2="11"/>
              </svg>
              Set Display Order
            </button>
            <button className="btn-add">+ Add Discount</button>
          </>
        )}

        <span className="mockup-badge">REDESIGN MOCKUP</span>
      </div>

      {/* Edit mode banner */}
      {editMode && (
        <div className="edit-banner">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#558B2F" strokeWidth="1.8">
            <line x1="7.5" y1="2"  x2="7.5" y2="13"/>
            <polyline points="4,5.5 7.5,2 11,5.5"/>
            <polyline points="4,9.5 7.5,13 11,9.5"/>
          </svg>
          Drag rows to set the eCommerce display order. Click <strong style={{margin:'0 3px'}}>Save Order</strong> to apply changes.
        </div>
      )}

      {/* Table */}
      <div className="table-wrap">
        <div className="count-label">{rows.length} Discounts</div>
        <div className="table-card">
          <table>
            <thead>
              <tr>
                {editMode && <th style={{width:'40px'}} />}
                <th>Name</th>
                <th>Method</th>
                <th>Amount</th>
                <th>Stores</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((row, idx) => {
                const isDragging = editMode && dragIdx === idx;
                const isDragOver = editMode && dragOverIdx === idx && dragIdx !== idx;

                return (
                  <tr
                    key={row.id}
                    draggable={editMode}
                    onDragStart={editMode ? e => onDragStart(e, idx) : undefined}
                    onDragOver={editMode  ? e => onDragOver(e, idx)  : undefined}
                    onDrop={editMode      ? e => onDrop(e, idx)      : undefined}
                    onDragEnd={editMode   ? onDragEnd                : undefined}
                    className={[
                      isDragging ? 'is-dragging'    : '',
                      isDragOver ? 'is-drag-over-top' : '',
                    ].join(' ')}
                  >
                    {editMode && (
                      <td style={{width:'40px', paddingRight:0}}>
                        <span className="drag-handle"><DragHandleIcon /></span>
                      </td>
                    )}
                    <td className="name-cell">{row.name}</td>
                    <td style={{color:'#555'}}>{row.method}</td>
                    <td style={{fontWeight:500}}>{row.amount}</td>
                    <td><StoreChip stores={row.stores} count={row.storeCount} /></td>
                    <td style={{color:'#666'}}>{row.start}</td>
                    <td style={{color:'#666'}}>{row.end}</td>
                    <td>
                      <span className="status-active">
                        <span className="status-dot" /> Active
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div className="toast">
          <div className="toast-check">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#fff" strokeWidth="2">
              <polyline points="1.5,5 4,7.5 8.5,2"/>
            </svg>
          </div>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
